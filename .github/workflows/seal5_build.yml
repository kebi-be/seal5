# Seal5 demonstration (also serves as end-to-end testj
name: Usage Seal5-Build

on:
  workflow_dispatch:
    inputs:
      script:
        description: "Script"
        required: true
        default: "demo.py"
      verbose:
        description: "Verbose (0/1)"
        required: true
        default: "0"
      fast:
        description: "Fast (0/1)"
        required: true
        default: "0"
      ignore_error:
        description: "Ignore Errors in TEST stage (0/1)"
        required: true
        default: "1"
      build_config:
        description: "Build Config (debug/release/...)"
        required: true
        default: "release"
# push:
#   branches:
#     - main
# pull_request:
#   branches:
#     - main
  repository_dispatch:
    types: [s4e_cdl_event]

jobs:
  trigger_etiss_build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
         submodules: recursive
         ref: ${{ github.event.client_payload.ref }}
    - run: echo ${{ github.event.client_payload.sha }}  
    - name: Download Core-DSL-Extension Artifacts
      uses: actions/download-artifact@v4
      with:
        name: riscv-core-dsl-files
        github-token: ${{ secrets.REPO_PA_TOKEN }}
        repository: kebi-be/riscv-coredsl-extensions
       #run-id: 1234
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: demo-export
        path: $GITHUB-WORKSPACE/
    - name: Trigger ETISS Build
      uses: peter-evans/repository-dispatch@v3
      with:
         token: ${{ secrets.REPO_PA_TOKEN }}
         repository: kebi-be/etiss_wysiwyng
         event-type: seal5-event
         client-payload: '{"github": ${{ toJson(github) }}}'       
            
  demo:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install APT packages
      run: |
        sudo apt -qq install -y python3-pip python3-venv cmake make ninja-build
    - name: Initialize Virtualenv
      run: |
        python -m pip install --upgrade pip
        python -m venv .venv
    - name: Install dependencies
      run: |
        source .venv/bin/activate
        pip install -r requirements.txt
    - name: Run package creation
      run: |
        source .venv/bin/activate
        pip install -e .
    - name: Run the demo
      run: |
        source .venv/bin/activate
        VERBOSE=${{ github.event.inputs.verbose }} FAST=${{ github.event.inputs.fast }} BUILD_CONFIG=${{ github.event.inputs.build_config }} IGNORE_ERROR=${{ github.event.inputs.ignore_error }} DEST=/tmp/seal5_llvm python examples/${{ github.event.inputs.script }}
    - uses: actions/upload-artifact@v4
      with:
        name: demo-export
        path: /tmp/seal5_llvm.tar.gz
